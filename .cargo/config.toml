# Build to the Pumpkin plugin target by default.
[build]
target = "wasm32-wasip2"

# Use the newer standalone wasm-component-ld (0.5.22+) instead of the one bundled
# with the Rust toolchain (0.5.15). The bundled linker rejects componentization of
# the Pumpkin WIT because wit-bindgen 0.57 encodes enum/record names like
# `generic-nine-x-one` and `line-one` in an abbreviated form (`generic-9x1`,
# `line-1`) that older validators consider non-kebab-case. 0.5.22 is lenient enough
# to emit the component. Install with: cargo install wasm-component-ld --locked
[target.wasm32-wasip2]
linker = "C:\\Users\\justxdude\\.cargo\\bin\\wasm-component-ld.exe"

# ring's build script needs a C compiler for wasm32-wasip2 (it compiles with
# -nostdlibinc, so a plain clang works without a WASI sysroot). The LLVM
# installer doesn't add itself to PATH, so point at it explicitly.
[env]
CC_wasm32_wasip2 = "C:\\Program Files\\LLVM\\bin\\clang.exe"
